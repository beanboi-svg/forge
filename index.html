      const m = url.match(/github\.com\/([^/]+)\/([^/]+)/);

      const [files, setFiles] = useState({ "index.html": SAMPLE });
      const [activeFile, setActiveFile] = useState("index.html");
      const [view, setView] = useState("visual");
      const [device, setDevice] = useState("desktop");
      const [zoom, setZoom] = useState(100);
      const [sidebarTab, setSidebarTab] = useState("files");
      const [selectedEl, setSelectedEl] = useState(null);
      const [githubModal, setGithubModal] = useState(false);
      const [repoUrl, setRepoUrl] = useState("");
      const [cloneStatus, setCloneStatus] = useState(null);
      const [toast, setToast] = useState(null);
      const [layers, setLayers] = useState([]);
      const fileInputRef = useRef(null);
      const toastTimer = useRef(null);

      const showToast = (message, type = "success") => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ message, type });
        toastTimer.current = setTimeout(() => setToast(null), 3000);
      };

      useEffect(() => {
        const handler = (e) => { if (e.data?.type === "elSel") setSelectedEl(e.data.data); };
        window.addEventListener("message", handler);
        return () => window.removeEventListener("message", handler);
      }, []);

      const getIframeSrc = useCallback(() => {
        const html = files[activeFile] || "";
        return html.includes("</body>") ? html.replace("</body>", IFRAME_INJECT + "</body>") : html + IFRAME_INJECT;
      }, [files, activeFile]);

      const handleFileUpload = (e) => {
        const uploaded = e.target.files;
        if (!uploaded?.length) return;
        const newFiles = { ...files };
        let count = 0;
        Array.from(uploaded).forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            newFiles[file.name] = ev.target.result;
            if (++count === uploaded.length) {
              setFiles({ ...newFiles });
              setActiveFile(uploaded[0].name);
              showToast(`${uploaded.length} file(s) uploaded`);
            }
          };
          reader.readAsText(file);
        });
        e.target.value = "";
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const dropped = e.dataTransfer.files;
        if (!dropped?.length) return;
        const newFiles = { ...files };
        let count = 0;
        Array.from(dropped).forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            newFiles[file.name] = ev.target.result;
            if (++count === dropped.length) {
              setFiles({ ...newFiles });
              setActiveFile(dropped[0].name);
              showToast(`${dropped.length} file(s) uploaded`);
            }
          };
          reader.readAsText(file);
        });
      };

      const handleClone = async () => {
        const parsed = parseGithubUrl(repoUrl);
        if (!parsed) { setCloneStatus({ type: "error", message: "Invalid GitHub URL." }); return; }
        setCloneStatus({ type: "loading", message: `Fetching ${parsed.owner}/${parsed.repo}...` });
        try {
          const treeRes = await fetch(`https://api.github.com/repos/${parsed.owner}/${parsed.repo}/git/trees/HEAD?recursive=1`);
          if (!treeRes.ok) throw new Error("Repo not found or is private");
          const treeData = await treeRes.json();
          const webFiles = (treeData.tree || []).filter(f =>
            f.type === "blob" &&
            (f.path.endsWith(".html") || f.path.endsWith(".css") || f.path.endsWith(".js")) &&
            !f.path.includes("node_modules") && (f.size || 0) < 500000
          ).slice(0, 20);
          if (!webFiles.length) throw new Error("No HTML/CSS/JS files found");
          setCloneStatus({ type: "loading", message: `Loading ${webFiles.length} files...` });
          const newFiles = {};
          await Promise.all(webFiles.map(async (file) => {
            try {
              const res = await fetch(`https://api.github.com/repos/${parsed.owner}/${parsed.repo}/contents/${file.path}`);
              const data = await res.json();
              if (data.content) newFiles[file.path.split("/").pop()] = atob(data.content.replace(/\n/g, ""));
            } catch (_) {}
          }));
          if (!Object.keys(newFiles).length) throw new Error("Could not fetch file contents");
          setFiles(prev => ({ ...prev, ...newFiles }));
          const firstHtml = Object.keys(newFiles).find(f => f.endsWith(".html")) || Object.keys(newFiles)[0];
          setActiveFile(firstHtml);
          setCloneStatus({ type: "success", message: `Cloned ${Object.keys(newFiles).length} files ✓` });
          setTimeout(() => { setGithubModal(false); setCloneStatus(null); setRepoUrl(""); showToast(`Cloned ${parsed.repo}`); }, 1500);
        } catch (err) {
          setCloneStatus({ type: "error", message: err.message });
        }
      };

      const downloadFile = (name, content) => {
        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = name; a.click();
        URL.revokeObjectURL(url);
      };

      const downloadAll = () => {
        Object.entries(files).forEach(([name, content]) => downloadFile(name, content));
        showToast(`Exported ${Object.keys(files).length} files`);
      };

      useEffect(() => {
        if (!files[activeFile] || !activeFile.endsWith(".html")) return;
        try {
          const parser = new DOMParser();
          const doc = parser.parseFromString(files[activeFile], "text/html");
          const els = [];
          const walk = (el, depth = 0) => {
            if (!el || el.nodeType !== 1) return;
            const tag = el.tagName.toLowerCase();
            if (["script","style","meta","link","head"].includes(tag)) return;
            els.push({ tag, id: el.id, className: typeof el.className === "string" ? el.className : "", depth });
            Array.from(el.children).forEach(c => walk(c, depth + 1));
          };
          walk(doc.body);
          setLayers(els.slice(0, 60));
        } catch (_) {}
      }, [activeFile, files]);

      const getExt = (name) => name.split(".").pop();
      const iframeH = device === "mobile" ? 812 : device === "tablet" ? 1024 : 800;
      const iframeW = device === "mobile" ? 375 : device === "tablet" ? 768 : 1200;
      const activeContent = files[activeFile] || "";

      return (
        <div className="app">
          {/* TOPBAR */}
          <div className="topbar">
            <div className="logo">
              <div className="logo-icon">✦</div>
              <span className="logo-text">Forge</span>
            </div>
            <div className="topbar-divider" />
            <div className="tool-group">
              <button className="tool-btn active"><Icon name="cursor" /> Select</button>
            </div>
            <div className="topbar-divider" />
            <div className="view-toggle">
              <button className={`view-btn ${view === "visual" ? "active" : ""}`} onClick={() => setView("visual")}>Visual</button>
              <button className={`view-btn ${view === "split" ? "active" : ""}`} onClick={() => setView("split")}>Split</button>
              <button className={`view-btn ${view === "code" ? "active" : ""}`} onClick={() => setView("code")}>Code</button>
            </div>
            <div className="spacer" />
            <div className="tool-group" style={{ gap: 8 }}>
              <button className="action-btn github" onClick={() => setGithubModal(true)}>
                <Icon name="github" size={13} /> Clone Repo
              </button>
              <button className="action-btn secondary" onClick={() => fileInputRef.current?.click()}>
                <Icon name="upload" size={13} /> Upload
              </button>
              <button className="action-btn secondary" onClick={downloadAll}>
                <Icon name="download" size={13} /> Export
              </button>
              <button className="action-btn primary" onClick={() => showToast("Saved!", "success")}>
                <Icon name="save" size={13} /> Save
              </button>
            </div>
          </div>

          <div className="main">
            {/* LEFT SIDEBAR */}
            <div className="sidebar">
              <div className="sidebar-tabs">
                <button className={`sidebar-tab ${sidebarTab === "files" ? "active" : ""}`} onClick={() => setSidebarTab("files")}>Files</button>
                <button className={`sidebar-tab ${sidebarTab === "layers" ? "active" : ""}`} onClick={() => setSidebarTab("layers")}>Layers</button>
              </div>
              <div className="sidebar-content">
                {sidebarTab === "files" && (
                  <>
                    <div className="sidebar-section">
                      <div className="sidebar-section-title">Project Files</div>
                      {Object.keys(files).map(name => (
                        <div key={name} className={`file-item ${activeFile === name ? "active" : ""}`} onClick={() => setActiveFile(name)}>
                          <Icon name="file" size={13} />
                          <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{name}</span>
                          <span className={`file-ext ext-${getExt(name)}`}>{getExt(name)}</span>
                        </div>
                      ))}
                    </div>
                    <div className="upload-zone" onClick={() => fileInputRef.current?.click()} onDrop={handleDrop} onDragOver={(e) => e.preventDefault()}>
                      <div className="upload-zone-icon">📁</div>
                      <p><span>Click to upload</span> or drag & drop<br />HTML, CSS, JS files</p>
                    </div>
                  </>
                )}
                {sidebarTab === "layers" && (
                  <div className="sidebar-section">
                    <div className="sidebar-section-title">DOM Layers</div>
                    {layers.length === 0 && <div style={{ color: "#3A3E55", fontSize: 11, padding: "8px 6px" }}>Select an HTML file</div>}
                    {layers.map((l, i) => (
                      <div key={i} className="layer-item" style={{ paddingLeft: 8 + l.depth * 10 }}>
                        <span className="layer-tag" style={{ color: "#6B9EDE" }}>&lt;</span>
                        <span className="layer-tag">{l.tag}</span>
                        {l.id && <span style={{ color: "#00D4AA88", fontSize: 10 }}>#{l.id}</span>}
                        {l.className && l.className.trim() && <span style={{ color: "#DE9B6B88", fontSize: 10 }}>.{l.className.trim().split(" ")[0]}</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* VISUAL VIEW */}
            {view === "visual" && (
              <div className="canvas-area">
                <div className="canvas-toolbar">
                  <button className={`device-btn ${device === "desktop" ? "active" : ""}`} onClick={() => setDevice("desktop")}><Icon name="desktop" size={16} /></button>
                  <button className={`device-btn ${device === "tablet" ? "active" : ""}`} onClick={() => setDevice("tablet")}><Icon name="tablet" size={16} /></button>
                  <button className={`device-btn ${device === "mobile" ? "active" : ""}`} onClick={() => setDevice("mobile")}><Icon name="mobile" size={16} /></button>
                  <div className="topbar-divider" />
                  <div className="url-bar">{activeFile || "No file selected"}</div>
                  <div className="spacer" />
                  <div className="zoom-ctrl">
                    <button className="zoom-btn" onClick={() => setZoom(z => Math.max(25, z - 10))}>−</button>
                    <span style={{ minWidth: 36, textAlign: "center", fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{zoom}%</span>
                    <button className="zoom-btn" onClick={() => setZoom(z => Math.min(200, z + 10))}>+</button>
                  </div>
                </div>
                {!activeFile ? (
                  <div className="empty-state">
                    <div className="empty-icon">🎨</div>
                    <div className="empty-title">Start Building</div>
                    <div className="empty-sub">Upload HTML/CSS files or clone a GitHub repo to begin.</div>
                    <div className="empty-actions">
                      <button className="action-btn github" onClick={() => setGithubModal(true)}><Icon name="github" size={13} /> Clone Repo</button>
                      <button className="action-btn secondary" onClick={() => fileInputRef.current?.click()}><Icon name="upload" size={13} /> Upload</button>
                    </div>
                  </div>
                ) : (
                  <div className="canvas-wrapper">
                    <div style={{ transform: `scale(${zoom / 100})`, transformOrigin: "top center" }}>
                      <div className="canvas-frame" style={{ width: iframeW }}>
                        <iframe srcDoc={getIframeSrc()} width={iframeW} height={iframeH} sandbox="allow-scripts allow-same-origin" title="preview" />
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* CODE VIEW */}
            {view === "code" && (
              <div className="code-editor">
                <div className="split-label">
                  <span>{activeFile || "No file"}</span>
                  {activeFile && <button className="action-btn secondary" style={{ padding: "4px 10px" }} onClick={() => downloadFile(activeFile, activeContent)}><Icon name="download" size={12} /> Download</button>}
                </div>
                <div className="code-content">
                  <textarea className="code-textarea" value={activeContent} onChange={(e) => setFiles(p => ({ ...p, [activeFile]: e.target.value }))} spellCheck={false} placeholder="Upload or clone a file to start editing..." />
                </div>
              </div>
            )}

            {/* SPLIT VIEW */}
            {view === "split" && (
              <div className="split-view">
                <div className="split-code">
                  <div className="split-label"><span>{activeFile || "No file"}</span></div>
                  <div className="code-content">
                    <textarea className="code-textarea" value={activeContent} onChange={(e) => setFiles(p => ({ ...p, [activeFile]: e.target.value }))} spellCheck={false} placeholder="Upload or clone a file to start editing..." />
                  </div>
                </div>
                <div className="split-preview">
                  <div className="split-label"><span>Preview</span></div>
                  <div style={{ flex: 1, overflow: "auto", background: "#0A0C14", padding: 16, height: "calc(100% - 37px)" }}>
                    {activeFile
                      ? <iframe srcDoc={getIframeSrc()} style={{ width: "100%", height: "100%", border: "none", borderRadius: 6, background: "white" }} sandbox="allow-scripts allow-same-origin" title="split-preview" />
                      : <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "#3A3E55", fontSize: 13 }}>No file selected</div>
                    }
                  </div>
                </div>
              </div>
            )}

            {/* RIGHT PROPERTIES PANEL */}
            {(view === "visual" || view === "split") && (
              <div className="right-panel">
                <div className="panel-header">Properties</div>
                <div className="panel-body">
                  {!selectedEl ? (
                    <div className="no-selection">
                      <div className="no-selection-icon">🖱️</div>
                      <p>Click any element in the preview to inspect its properties</p>
                    </div>
                  ) : (
                    <>
                      <div className="prop-group">
                        <div className="prop-group-title">Element</div>
                        <div className="prop-row"><span className="prop-label">Tag</span><input className="prop-input" value={selectedEl.tag} readOnly style={{ color: "#6B9EDE" }} /></div>
                        {selectedEl.id && <div className="prop-row"><span className="prop-label">ID</span><input className="prop-input" value={selectedEl.id} readOnly /></div>}
                        {selectedEl.className && <div className="prop-row"><span className="prop-label">Class</span><input className="prop-input" value={selectedEl.className} readOnly style={{ fontSize: 10 }} /></div>}
                        {selectedEl.textContent && <div className="prop-row"><span className="prop-label">Text</span><input className="prop-input" value={selectedEl.textContent} readOnly /></div>}
                      </div>
                      <div className="prop-group">
                        <div className="prop-group-title">Typography</div>
                        <div className="prop-row"><span className="prop-label">Font Size</span><input className="prop-input" value={selectedEl.styles?.fontSize || ""} readOnly /></div>
                        <div className="prop-row"><span className="prop-label">Weight</span><input className="prop-input" value={selectedEl.styles?.fontWeight || ""} readOnly /></div>
                        <div className="prop-row"><span className="prop-label">Color</span><input className="prop-input" value={selectedEl.styles?.color || ""} readOnly /><div className="color-swatch" style={{ background: selectedEl.styles?.color }} /></div>
                      </div>
                      <div className="prop-group">
                        <div className="prop-group-title">Layout</div>
                        <div className="prop-row"><span className="prop-label">Width</span><input className="prop-input" value={selectedEl.styles?.width || ""} readOnly /></div>
                        <div className="prop-row"><span className="prop-label">Height</span><input className="prop-input" value={selectedEl.styles?.height || ""} readOnly /></div>
                        <div className="prop-row"><span className="prop-label">Padding</span><input className="prop-input" value={selectedEl.styles?.padding || ""} readOnly /></div>
                        <div className="prop-row"><span className="prop-label">Margin</span><input className="prop-input" value={selectedEl.styles?.margin || ""} readOnly /></div>
                      </div>
                      <div className="prop-group">
                        <div className="prop-group-title">Background</div>
                        <div className="prop-row"><span className="prop-label">BG Color</span><input className="prop-input" value={selectedEl.styles?.backgroundColor || ""} readOnly /><div className="color-swatch" style={{ background: selectedEl.styles?.backgroundColor }} /></div>
                      </div>
                    </>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* GITHUB MODAL */}
          {githubModal && (
            <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) { setGithubModal(false); setCloneStatus(null); setRepoUrl(""); } }}>
              <div className="modal">
                <div className="modal-title"><Icon name="github" size={20} /> Clone GitHub Repository</div>
                <p className="modal-sub">Paste a public GitHub URL to import HTML, CSS, and JS files into your project.</p>
                {cloneStatus && <div className={`modal-status ${cloneStatus.type}`}>{cloneStatus.message}</div>}
                <input className="modal-input" placeholder="https://github.com/username/repository" value={repoUrl} onChange={(e) => setRepoUrl(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleClone()} autoFocus />
                <p className="modal-hint">Only public repositories. Imports <code>.html</code>, <code>.css</code>, and <code>.js</code> files (up to 20).</p>
                <div className="modal-actions">
                  <button className="action-btn secondary" onClick={() => { setGithubModal(false); setCloneStatus(null); setRepoUrl(""); }}>Cancel</button>
                  <button className="action-btn primary" onClick={handleClone} disabled={!repoUrl.trim()}><Icon name="github" size={13} /> Clone</button>
                </div>
              </div>
            </div>
          )}

          <input ref={fileInputRef} type="file" multiple accept=".html,.css,.js" style={{ display: "none" }} onChange={handleFileUpload} />

          {toast && (
            <div className={`toast ${toast.type}`}>
              <div className="toast-dot" />
              {toast.message}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
